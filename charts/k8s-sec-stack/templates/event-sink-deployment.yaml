apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-event-sink
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-event-sink
  template:
    metadata:
      labels:
        app: mcp-event-sink
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/event-sink-configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: sink
          image: python:3.12-slim
          command: ["python", "/app/server.py"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: script
              mountPath: /app
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: script
          configMap:
            name: mcp-event-sink
        - name: data
          persistentVolumeClaim:
            claimName: mcp-event-sink-data
