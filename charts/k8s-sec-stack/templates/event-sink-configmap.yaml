apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-event-sink
  namespace: {{ .Release.Namespace }}
data:
  server.py: |
    #!/usr/bin/env python3
    """Falco event sink — SQLite-backed, 30-day retention, trends endpoint."""

    import json
    import sqlite3
    import threading
    import time
    from http.server import BaseHTTPRequestHandler, HTTPServer
    from urllib.parse import urlparse, parse_qs

    DB_PATH = "/data/events.db"
    RETENTION_DAYS = 30
    PRIORITY_ORDER = ["EMERGENCY", "ALERT", "CRITICAL", "ERROR", "WARNING", "NOTICE", "INFORMATIONAL", "DEBUG"]
    LOCK = threading.Lock()


    def init_db():
        with sqlite3.connect(DB_PATH) as conn:
            conn.execute("""
                CREATE TABLE IF NOT EXISTS events (
                    id      INTEGER PRIMARY KEY AUTOINCREMENT,
                    time    TEXT NOT NULL,
                    priority TEXT,
                    rule    TEXT,
                    ns      TEXT,
                    pod     TEXT,
                    image   TEXT,
                    process TEXT,
                    tags    TEXT,
                    raw     TEXT NOT NULL
                )
            """)
            conn.execute("CREATE INDEX IF NOT EXISTS idx_time     ON events(time)")
            conn.execute("CREATE INDEX IF NOT EXISTS idx_priority ON events(priority)")
            conn.execute("CREATE INDEX IF NOT EXISTS idx_ns       ON events(ns)")
            conn.execute("CREATE INDEX IF NOT EXISTS idx_rule     ON events(rule)")
            conn.execute("""
                CREATE TABLE IF NOT EXISTS posture_snapshots (
                    id         INTEGER PRIMARY KEY AUTOINCREMENT,
                    snapped_at TEXT NOT NULL,
                    tool       TEXT NOT NULL,
                    namespace  TEXT,
                    metric     TEXT NOT NULL,
                    value      REAL NOT NULL,
                    labels     TEXT
                )
            """)
            conn.execute("CREATE INDEX IF NOT EXISTS idx_ps_snapped_at ON posture_snapshots(snapped_at)")
            conn.execute("CREATE INDEX IF NOT EXISTS idx_ps_tool       ON posture_snapshots(tool)")
            conn.commit()
        print(f"DB ready: {DB_PATH}", flush=True)


    def purge_old():
        with LOCK:
            with sqlite3.connect(DB_PATH) as conn:
                cur = conn.execute(
                    "DELETE FROM events WHERE time < datetime('now', ?)",
                    (f"-{RETENTION_DAYS} days",)
                )
                ps_cur = conn.execute(
                    "DELETE FROM posture_snapshots WHERE snapped_at < datetime('now', ?)",
                    (f"-{RETENTION_DAYS} days",)
                )
                conn.commit()
                if cur.rowcount:
                    print(f"purged {cur.rowcount} events older than {RETENTION_DAYS} days", flush=True)
                if ps_cur.rowcount:
                    print(f"purged {ps_cur.rowcount} posture snapshots older than {RETENTION_DAYS} days", flush=True)


    def retention_loop():
        while True:
            time.sleep(3600)
            purge_old()


    def insert_event(event: dict):
        fields = event.get("output_fields") or {}
        with LOCK:
            with sqlite3.connect(DB_PATH) as conn:
                conn.execute(
                    "INSERT INTO events (time, priority, rule, ns, pod, image, process, tags, raw) "
                    "VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?)",
                    (
                        event.get("time"),
                        event.get("priority"),
                        event.get("rule"),
                        fields.get("k8s.ns.name"),
                        fields.get("k8s.pod.name"),
                        fields.get("container.image.repository"),
                        fields.get("proc.name"),
                        json.dumps(event.get("tags", [])),
                        json.dumps(event),
                    )
                )
                conn.commit()


    def insert_posture_snapshots(snapshots: list):
        with LOCK:
            with sqlite3.connect(DB_PATH) as conn:
                conn.executemany(
                    "INSERT INTO posture_snapshots (snapped_at, tool, namespace, metric, value, labels) "
                    "VALUES (?, ?, ?, ?, ?, ?)",
                    [
                        (
                            s["snapped_at"],
                            s["tool"],
                            s.get("namespace"),
                            s["metric"],
                            s["value"],
                            json.dumps(s["labels"]) if s.get("labels") else None,
                        )
                        for s in snapshots
                    ],
                )
                conn.commit()


    def query_posture_trends(tool="all", namespace="all", days=30):
        clauses = ["snapped_at >= datetime('now', ?)"]
        params = [f"-{days} days"]

        if tool != "all":
            clauses.append("tool = ?")
            params.append(tool)

        if namespace not in ("all", ""):
            clauses.append("(namespace = ? OR namespace IS NULL)")
            params.append(namespace)

        where = "WHERE " + " AND ".join(clauses)
        sql = f"""
            SELECT date(snapped_at) as day, tool, namespace, metric,
                   AVG(value) as value, MIN(labels) as labels
            FROM posture_snapshots
            {where}
            GROUP BY day, tool, namespace, metric
            ORDER BY day DESC, tool, namespace, metric
        """

        with LOCK:
            with sqlite3.connect(DB_PATH) as conn:
                rows = conn.execute(sql, params).fetchall()

        by_tool: dict = {}
        for day, t, ns, metric, value, labels in rows:
            entry = {"date": day, "namespace": ns, "metric": metric, "value": round(value, 2)}
            if labels:
                entry["labels"] = json.loads(labels)
            by_tool.setdefault(t, []).append(entry)

        return {"days": days, **by_tool}


    def query_events(priority="ALL", namespace="", pod="", rule="", hours=0, limit=50):
        clauses, params = [], []

        if priority != "ALL" and priority in PRIORITY_ORDER:
            cutoff = PRIORITY_ORDER.index(priority)
            placeholders = ",".join("?" * (cutoff + 1))
            clauses.append(f"priority IN ({placeholders})")
            params.extend(PRIORITY_ORDER[:cutoff + 1])

        if namespace:
            clauses.append("ns LIKE ?")
            params.append(f"%{namespace}%")

        if pod:
            clauses.append("pod LIKE ?")
            params.append(f"%{pod}%")

        if rule:
            clauses.append("rule LIKE ?")
            params.append(f"%{rule}%")

        if hours > 0:
            clauses.append("time >= datetime('now', ?)")
            params.append(f"-{hours} hours")

        where = ("WHERE " + " AND ".join(clauses)) if clauses else ""
        sql = f"SELECT raw FROM events {where} ORDER BY time DESC LIMIT ?"
        params.append(limit)

        with LOCK:
            with sqlite3.connect(DB_PATH) as conn:
                rows = conn.execute(sql, params).fetchall()

        return [json.loads(r[0]) for r in rows]


    def query_trends(days=7):
        with LOCK:
            with sqlite3.connect(DB_PATH) as conn:
                # events per day
                daily = conn.execute("""
                    SELECT date(time) as day, priority, count(*) as cnt
                    FROM events
                    WHERE time >= datetime('now', ?)
                    GROUP BY day, priority
                    ORDER BY day DESC
                """, (f"-{days} days",)).fetchall()

                # top rules
                top_rules = conn.execute("""
                    SELECT rule, count(*) as cnt
                    FROM events
                    WHERE time >= datetime('now', ?)
                    GROUP BY rule
                    ORDER BY cnt DESC
                    LIMIT 20
                """, (f"-{days} days",)).fetchall()

                # top namespaces
                top_ns = conn.execute("""
                    SELECT ns, count(*) as cnt
                    FROM events
                    WHERE time >= datetime('now', ?)
                      AND ns IS NOT NULL
                    GROUP BY ns
                    ORDER BY cnt DESC
                    LIMIT 10
                """, (f"-{days} days",)).fetchall()

                total = conn.execute(
                    "SELECT count(*) FROM events WHERE time >= datetime('now', ?)",
                    (f"-{days} days",)
                ).fetchone()[0]

        by_day = {}
        for day, priority, cnt in daily:
            by_day.setdefault(day, {})[priority] = cnt

        return {
            "days": days,
            "total_events": total,
            "by_day": [{"date": d, "counts": c} for d, c in sorted(by_day.items(), reverse=True)],
            "top_rules": [{"rule": r, "count": c} for r, c in top_rules],
            "top_namespaces": [{"namespace": n, "count": c} for n, c in top_ns],
        }


    class Handler(BaseHTTPRequestHandler):
        def log_message(self, fmt, *args):
            print(f"{self.address_string()} {fmt % args}", flush=True)

        def do_POST(self):
            length = int(self.headers.get("Content-Length", 0))
            body = self.rfile.read(length)
            try:
                if self.path == "/posture/snapshot":
                    insert_posture_snapshots(json.loads(body))
                else:
                    insert_event(json.loads(body))
                self.send_response(200)
                self.end_headers()
            except Exception as e:
                print(f"bad payload: {e}", flush=True)
                self.send_response(400)
                self.end_headers()

        def _json(self, data):
            body = json.dumps(data).encode()
            self.send_response(200)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def do_GET(self):
            parsed = urlparse(self.path)
            qs = parse_qs(parsed.query)

            if parsed.path == "/healthz":
                self.send_response(200)
                self.end_headers()
                self.wfile.write(b"ok")

            elif parsed.path == "/events":
                self._json(query_events(
                    priority=qs.get("priority", ["ALL"])[0].upper(),
                    namespace=qs.get("namespace", [""])[0],
                    pod=qs.get("pod", [""])[0],
                    rule=qs.get("rule", [""])[0],
                    hours=int(qs.get("hours", ["0"])[0]),
                    limit=int(qs.get("limit", ["50"])[0]),
                ))

            elif parsed.path == "/events/trends":
                self._json(query_trends(
                    days=int(qs.get("days", ["7"])[0]),
                ))

            elif parsed.path == "/posture/trends":
                self._json(query_posture_trends(
                    tool=qs.get("tool", ["all"])[0].lower(),
                    namespace=qs.get("namespace", ["all"])[0],
                    days=int(qs.get("days", ["30"])[0]),
                ))

            else:
                self.send_response(404)
                self.end_headers()


    if __name__ == "__main__":
        init_db()
        purge_old()
        threading.Thread(target=retention_loop, daemon=True).start()
        server = HTTPServer(("0.0.0.0", 8080), Handler)
        print("mcp-event-sink listening on :8080", flush=True)
        server.serve_forever()
