apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-host-namespaces
  annotations:
    policies.kyverno.io/title: Disallow Host Namespaces
    policies.kyverno.io/category: Pod Security - Baseline
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Sharing the host's PID, network, or IPC namespace gives containers
      visibility into host-level processes and network traffic. This policy
      audits pods that enable any of hostPID, hostNetwork, or hostIPC.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: host-namespaces
      match:
        any:
          - resources:
              kinds: [Pod]
      exclude:
        any:
          - resources:
              namespaces: [kube-system, kube-public, kube-node-lease, security, kubescape]
      validate:
        message: "Host namespaces (hostPID, hostNetwork, hostIPC) are not allowed."
        pattern:
          spec:
            =(hostPID): "false"
            =(hostNetwork): "false"
            =(hostIPC): "false"
