apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-non-root
  annotations:
    policies.kyverno.io/title: Require Non-Root Containers
    policies.kyverno.io/category: Pod Security - Restricted
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Running containers as root increases the blast radius of a compromise.
      This policy audits containers that do not set runAsNonRoot: true or
      explicitly set runAsUser to a non-zero UID.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: non-root-user
      match:
        any:
          - resources:
              kinds: [Pod]
      exclude:
        any:
          - resources:
              namespaces: [kube-system, kube-public, kube-node-lease, security, kubescape]
      validate:
        message: "Containers must not run as root. Set runAsNonRoot: true or runAsUser > 0."
        anyPattern:
          - spec:
              securityContext:
                runAsNonRoot: "true"
          - spec:
              securityContext:
                runAsUser: ">0"
          - spec:
              containers:
                - securityContext:
                    runAsNonRoot: "true"
          - spec:
              containers:
                - securityContext:
                    runAsUser: ">0"
