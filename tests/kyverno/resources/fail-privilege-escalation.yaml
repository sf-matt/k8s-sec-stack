# Violates: disallow-privilege-escalation / privilege-escalation
# Policy requires allowPrivilegeEscalation: false explicitly — true triggers the rule.
apiVersion: v1
kind: Pod
metadata:
  name: fail-privilege-escalation
  namespace: test-ns
spec:
  containers:
    - name: app
      image: nginx:1.25
      resources:
        limits:
          cpu: "100m"
          memory: "128Mi"
      securityContext:
        privileged: false
        allowPrivilegeEscalation: true    # VIOLATION
        runAsNonRoot: true
        runAsUser: 1000
        readOnlyRootFilesystem: true
